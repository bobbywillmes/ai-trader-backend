services:
  postgres:
    image: postgres:16
    container_name: ai-trader-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ai_trader
    volumes:
      - ai_trader_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d ai_trader"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ai_trader_internal

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-trader-prod-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://trader:${POSTGRES_PASSWORD}@postgres:5432/ai_trader
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - ai_trader_internal

  caddy:
    image: caddy:2
    container_name: ai-trader-prod-caddy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ai_trader_caddy_data:/data
      - ai_trader_caddy_config:/config
    depends_on:
      - backend
    networks:
      - ai_trader_internal

volumes:
  ai_trader_postgres_data:
  ai_trader_caddy_data:
  ai_trader_caddy_config:

networks:
  ai_trader_internal:
    driver: bridge